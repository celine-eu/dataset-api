version: "3"

tasks:
  setup:
    desc: Setup environment
    cmds:
      - uv sync

  run:
    desc: "Run development server"
    cmds:
      - .venv/bin/uvicorn celine.dataset.main:create_app --reload --host 0.0.0.0 --port 8001
  debug:
    desc: "Run development server with debugger"
    cmds:
      - DEBUG_ATTACH=nowait DEBUG_PORT=48001 .venv/bin/uvicorn celine.dataset.main:create_app --reload --host 0.0.0.0 --port 8001
  test:
    desc: "Run tests"
    cmds:
      - uv run pytest -- {{.CLI_ARGS}}

  cli:export:openlineage:
    desc: Export lineage from marquez
    cmds:
      - mkdir -p ./data/openlineage
      - uv run dataset-cli export openlineage --ns '*' -o ./data/openlineage --expose
  cli:export:governance:
    desc: Export from governance.yaml
    cmds:
      - mkdir -p ./data/governance
      - dataset-cli export governance "../celine-pipelines/**/governance.yaml" -o ./data/governance --expose --verbose
      - dataset-cli export governance "../../../demo3/pipelines/**/governance.yaml" -o ./data/governance --expose --verbose

  cli:import:openlineage:
    desc: Import datasets to API catalogue
    cmds:
      - uv run dataset-cli import catalogue --input "./data/openlineage/*.yaml" --api-url http://localhost:8001 --verbose || true
  cli:import:governance:
    desc: Import datasets to API catalogue
    cmds:
      - uv run dataset-cli import catalogue --input "./data/governance/*.yaml" --api-url http://localhost:8001 --verbose

  alembic:migrate:
    desc: "Run migrations"
    cmds:
      - uv run alembic upgrade head

  alembic:sync-model:
    desc: "Create new revision"
    cmds:
      - uv run alembic revision --autogenerate -m \"$MSG\"
    vars:
      MSG: "update model"

  alembic:reset:
    desc: "Reset DB schema"
    cmds:
      - uv run alembic downgrade base

  release:
    cmds:
      - uv run semantic-release -v version --no-vcs-release
      - git push
      - git push --tags
